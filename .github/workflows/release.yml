name: release

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies

      - name: Run tests
        run: |
          xcodebuild \
            -project okawa.xcodeproj \
            -scheme okawa \
            -destination 'platform=macOS' \
            test

  build-release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies

      - name: Build okawa (Release)
        run: |
          xcodebuild \
            -project okawa.xcodeproj \
            -target okawa \
            -configuration Release \
            SYMROOT="$(pwd)/build" \
            "CODE_SIGN_IDENTITY=" \
            "CODE_SIGNING_REQUIRED=NO"

      - name: Zip app
        run: |
          cd build/Release
          zip -r okawa.zip okawa.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: okawa.zip
          path: build/Release/okawa.zip

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Release/okawa.zip
